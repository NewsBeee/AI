name: "😈 Bug Report"
description: "버그 발생 시 제보"
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: 🚨 버그 설명
      description: 어떤 버그인지 자세히 작성해 주세요.
      placeholder: 예) 특정 페이지에서 버튼이 작동하지 않습니다.
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🧩 재현 방법
      description: 버그가 발생하는 과정을 단계별로 설명해 주세요.
      placeholder: |
        1. 기사 변환 후 '단어 저장' 클릭
        2. 단어장 목록에서 확인
        3. 저장된 단어가 없음
    validations:
      required: true

  - type: textarea
    attributes:
      label: 📸 스크린샷 (선택)
      description: 가능하다면 스크린샷을 첨부해 주세요.
